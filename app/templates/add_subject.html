<!DOCTYPE html>
<html>
<head>

<title>Add Subject</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="header">

<div class="logo">
TIU
</div>

<div class="title">
Techno India University <br>
Routine Optimization System
</div>

</div>

<div class="form-container">

<div class="form-card">

<h1>Add Subject</h1>

<form method="POST" id="subjectForm">

<div id="subjects">

<div class="subject-block">

<div class="row">
<label>Year</label>
<select name="year[]">
<option value="MCA1">MCA1</option>
<option value="MCA2">MCA2</option>
<!-- <option value="BCA1">BCA1</option>
<option value="BCA2">BCA2</option>
<option value="BCA3">BCA3</option> -->
</select>
</div>

<div class="row">
<label>Section</label>
<select name="section[]">
<option value="A">A</option>
<option value="B">B</option>
</select>
</div>

<div class="row">
<label>Subject Name</label>
<input type="text" name="subject[]" required>
</div>

<div class="row">
<label>Teacher</label>
<input type="text" name="teacher[]" required>
</div>

<div class="row">
<label>Type</label>
<select name="type[]">
<option value="theory">Theory</option>
<option value="lab">Lab</option>
</select>
</div>

<div class="row">
<label>Hours per Week</label>
<input type="number" name="hours[]" min="1" max="5" required>
</div>

<hr>

</div>

</div>

<button type="button" class="btn-secondary" onclick="addRow()">
+ Add Another Subject
</button>

<button type="submit" class="btn-main">
Save All Subjects
</button>



</form>

<hr>

<h3>Upload from Excel</h3>

<form method="POST" action="/upload_subjects" enctype="multipart/form-data">

<input type="file" name="file" required>

<button class="btn-main">Upload File</button>

</form>

<a href="/" class="back-link">⬅ Back to Dashboard</a>

</div>

</div>

<script>
function addRow(){

let block = document.querySelector(".subject-block");
let clone = block.cloneNode(true);

// clear inputs
clone.querySelectorAll("input").forEach(i => i.value = "");

document.getElementById("subjects").appendChild(clone);

}
</script>

</body>
</html>
